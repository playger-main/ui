<div class="page-content">
  <ion-content [fullscreen]="true">

    <div class="header-container">
      <h4>Grounds</h4>

      <ion-button fill="outline" id="open-modal" expand="block" size="large">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>

      <ion-modal
        #modal
        trigger="open-modal"
        [presentingElement]="presentingElement"
        (willPresent)="onWillPresent()"
      >
        <ng-template>
          <app-add-ground
            [modal]="modal"
            (newGroundForm)="onNewGroundForm.emit($event)"
          ></app-add-ground>
        </ng-template>
      </ion-modal>
    </div>

    <div class="header-menu">
      <div class="map-container">
        <!-- ✅ передаём площадки в карту -->
        <app-map [grounds]="listPlaygrounds"></app-map>
      </div>

      <!-- ✅ если SearchComponent пока сам по себе — оставь так -->
      <app-search></app-search>

      <!-- 🔁 если SearchComponent должен знать избранные/виды спорта — можно так:
      <app-search
        [listfavoriteKindOfSport]="listfavoriteKindOfSport"
        [selectedKindOfSport]="selectedKindOfSport"
      ></app-search>
      -->
    </div>

    <!-- ✅ оставляем как у тебя было по именам инпутов -->
    <app-playgrounds
      [listPlaygrounds]="listPlaygrounds"
      [listFavoriteGrounds]="listFavoriteGrounds()"
    ></app-playgrounds>

  </ion-content>
</div>
