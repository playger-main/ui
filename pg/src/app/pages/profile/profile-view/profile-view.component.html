<ion-content fullscreen class="profile-page" *ngIf="user">
  <ion-card class="profile-card">
    <ion-list-header>
      <ion-icon
        name="heart"
        slot="start"
        color="danger"
        style="margin-right: 8px"
      ></ion-icon>
      <ion-label
        ><strong>{{ user.username }}</strong></ion-label
      >
      <ion-label
        ><strong>{{ user.roles }}</strong></ion-label
      >
    </ion-list-header>

    <ion-card-content>
      <ion-list lines="none">
        <ion-item>
          <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <strong>Email:</strong>
            <div>{{ user.email }}</div>
          </ion-label>
        </ion-item>

        <ion-item>
          <ion-icon
            name="location-outline"
            slot="start"
            color="tertiary"
          ></ion-icon>
          <ion-label>
            <strong>Location:</strong>
            <div>{{ user.geolocation.address }}</div>
          </ion-label>
        </ion-item>

        <ion-item>
          <ion-icon
            name="calendar-outline"
            slot="start"
            color="medium"
          ></ion-icon>
          <ion-label>
            <strong>Account Created:</strong>
            <div>{{ user.createdAt | date: "medium" }}</div>
          </ion-label>
        </ion-item>
      </ion-list>

      <div class="password-box">
        <ion-button
          expand="block"
          fill="outline"
          (click)="showPasswordSettings = !showPasswordSettings"
        >
          {{ showPasswordSettings ? "Hide" : "Change" }} Password Settings
        </ion-button>
        <div *ngIf="showPasswordSettings" class="password-settings">
          <ion-item>
            <ion-label position="floating">Current Password</ion-label>
            <ion-input type="password"></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="floating">New Password</ion-label>
            <ion-input type="password"></ion-input>
          </ion-item>

          <ion-button expand="block" color="primary"
            >Update Password</ion-button
          >
        </div>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>

<style>
  .profile-page {
    --ion-background-color: #f4f5f8;
  }

  .profile-card {
    margin: 16px;
    border-radius: 16px;
  }

  .password-settings ion-item {
    margin-top: 8px;
  }
</style>
