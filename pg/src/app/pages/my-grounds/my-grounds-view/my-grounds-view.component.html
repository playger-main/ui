<ion-content [fullscreen]="true">
  <ion-list-header>
    <ion-label><strong>My Favorite Grounds</strong></ion-label>
  </ion-list-header>

  <ng-container *ngIf="favoriteGrounds?.length; else empty">
    <ion-card
      *ngFor="let g of favoriteGrounds; trackBy: trackById"
      (click)="onGroundClick(g.id)"
      style="cursor: pointer"
    >
      <ion-card-header>
        <ion-card-title>{{ g.name }}</ion-card-title>
        <ion-card-subtitle>{{ g.address }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-button
          fill="clear"
          (click)="onToggleFavorite($event, g)"
        >
          <ion-icon
            slot="icon-only"
            [name]="g.isFavorite ? 'heart' : 'heart-outline'"
            color="danger"
          ></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>
  </ng-container>

  <ng-template #empty>
    <p class="ion-padding">No favorite grounds yet.</p>
  </ng-template>
</ion-content>
