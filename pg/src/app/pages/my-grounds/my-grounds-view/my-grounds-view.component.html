<ion-content [fullscreen]="true">
  <ion-list-header>
    <ion-label><strong>Favorite Grounds</strong></ion-label>
  </ion-list-header>

  <ng-container *ngIf="favoriteGrounds?.length; else empty">
    <ion-card
      *ngFor="let g of favoriteGrounds; trackBy: trackById"
      (click)="onGroundClick(g.id)"
      style="cursor: pointer"
    >
      <ion-card-header>
        <ion-card-title>{{ g.name }}</ion-card-title>
        <ion-card-subtitle *ngIf="g.address">{{ g.address }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <p *ngIf="g.description">{{ g.description }}</p>

        <p *ngIf="(g.kindofsport ?? []).length">
          <strong>Sport:</strong> {{ (g.kindofsport ?? []).join(', ') }}
        </p>

        <p *ngIf="(g.coverage ?? []).length">
          <strong>Coverage:</strong> {{ (g.coverage ?? []).join(', ') }}
        </p>

        <ion-button fill="outline" size="small" (click)="onToggleFavorite($event, g)">
          <ion-icon slot="start" name="heart"></ion-icon>
          Remove
        </ion-button>
      </ion-card-content>
    </ion-card>
  </ng-container>

  <ng-template #empty>
    <p class="ion-padding">No favorites yet.</p>
  </ng-template>
</ion-content>
