<ion-content [fullscreen]="true" *ngIf="event as e">
  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ e.name }}</ion-card-title>

      <ion-card-subtitle>
        <ion-icon name="calendar-outline" style="margin-right: 6px"></ion-icon>
        {{ e.date | date: 'mediumDate' }} • {{ e.startTime }}
      </ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <p>{{ e.description }}</p>

      <ion-item lines="none" *ngIf="e.ground as g">
        <ion-icon slot="start" name="location-outline"></ion-icon>
        <ion-label>
          <div><strong>Ground:</strong> {{ g.name }}</div>
          <div style="opacity: 0.75">
            <strong>Address:</strong> {{ g.address }}
          </div>
        </ion-label>
      </ion-item>

      <ion-item
        lines="none"
        *ngIf="e.creator as c"
        style="cursor: pointer"
        (click)="onOrganizerClick.emit(c.id)"
      >
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-label>
          <div><strong>Creator:</strong> {{ c.name }}</div>
          <div style="opacity: 0.75">
            <strong>Roles:</strong> {{ (c.role ?? []).join(', ') }}
          </div>
        </ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
</ion-content>
