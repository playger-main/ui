<div class="page-content">
  <ion-content [fullscreen]="true">
    <div class="header-container">
      <h4>Events</h4>

      <ion-button fill="outline" id="open-modal" expand="block" size="large">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
      <ion-modal
        #modal
        trigger="open-modal"
        [presentingElement]="presentingElement"
        (willPresent)="onWillPresent()"
      >
        <ng-template>
          <app-add-event
            [modal]="modal"
            (newEventForm)="onNewEventForm.emit($event)"
          ></app-add-event> </ng-template
      ></ion-modal>
    </div>

    <ion-list>
      <ion-card
        *ngFor="let event of listEvents"
        (click)="goToCurrentEventPage.emit(event.id)"
        style="cursor: pointer"
      >
        <ion-card-header>
          <ion-card-title>{{ event.name }}</ion-card-title>
          <ion-card-subtitle>{{ event.category }}</ion-card-subtitle>
        </ion-card-header>
        <ion-card-content>
          <p><strong>Date:</strong> {{ event.date }} {{ event.startTime }}</p>
          <p><strong>Duration:</strong> {{ event.duration }} min</p>
          <p><strong>Location:</strong> {{ event.location.address }}</p>
          <p>{{ event.description }}</p>
        </ion-card-content>
      </ion-card>
    </ion-list>
  </ion-content>
</div>
