<ion-content  class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Авторизация</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Пользователь</ion-label>
        <ion-input type="text" [(ngModel)]="user"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Пароль</ion-label>
        <ion-input type="password" [(ngModel)]="password"></ion-input>
      </ion-item>

      <ion-button expand="full" (click)="login()">Войти</ion-button>

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

      <ion-button fill="clear" routerLink="/register">Регистрация</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
