<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Создать аккаунт</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Имя Пользователя</ion-label>
        <ion-input type="text" [(ngModel)]="username"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Пароль</ion-label>
        <ion-input type="password" [(ngModel)]="password"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Подтвердите пароль</ion-label>
        <ion-input type="password" [(ngModel)]="confirmPassword"></ion-input>
      </ion-item>

      <ion-button expand="full" (click)="register()">Зарегистрироваться</ion-button>

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

      <ion-button fill="clear" routerLink="/login">Уже есть аккаунт?</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
