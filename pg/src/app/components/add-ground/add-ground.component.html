<div class="ion-page">
  <ion-header>
    <ion-toolbar>
      <ion-title>Add event</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="modal.dismiss()">Close</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <form (ngSubmit)="onSubmit()">
      <ion-list>
        <ion-item>
          <ion-label position="stacked">Name</ion-label>
          <ion-input [(ngModel)]="ground.name" name="name" required></ion-input>
        </ion-item>

        <!-- ✅ coverage: string[] -> вводим текстом, сохраняем в coverageText -->
        <ion-item>
          <ion-label position="stacked">Coverage (comma separated)</ion-label>
          <ion-input [(ngModel)]="coverageText" name="coverageText"></ion-input>
        </ion-item>

        <!-- ✅ kindofsport: string[] -> вводим текстом -->
        <ion-item>
          <ion-label position="stacked">Kind of sport (comma separated)</ion-label>
          <ion-input [(ngModel)]="kindofsportText" name="kindofsportText"></ion-input>
        </ion-item>

        <!-- ✅ address вместо location.address -->
        <ion-item>
          <ion-label position="stacked">Address</ion-label>
          <ion-input [(ngModel)]="ground.address" name="address"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Avatar URL</ion-label>
          <ion-input [(ngModel)]="ground.avatar" name="avatar"></ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-button expand="block" type="submit">Save</ion-button>
        </ion-item>
      </ion-list>
    </form>
  </ion-content>
</div>
