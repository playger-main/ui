<div class="drop-down-panel-box">
  <ion-modal [isOpen]="true" class="activity-box"
  #modal
  [keepContentsMounted]="true"
  [breakpoints]="[0.2, 0.3, 0.5, 1]"
  [initialBreakpoint]="0.3"
  [backdropBreakpoint]="0.1"
>

<ng-template>
  <div class="modal-content">
    <ng-content select="[search]" />
 
    <ng-content select="[favoriteSports]" />


  </div>
 
</ng-template>

</ion-modal>
</div>
