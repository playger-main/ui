<ion-list>
  <ion-card
    class="playground-item"
    [ngClass]="{ 'green-card': (item.eventsCount ?? 0) > 0 }"
    *ngFor="let item of (listPlaygrounds ?? [])"
    [routerLink]="['/ground', item.id]"
  >
    <div class="playground-card-content">
      <img
        [src]="item.avatar || 'assets/icon/placeholder-ground.png'"
        alt="photo"
        class="playground-photo"
      />

      <div class="playground-info">
        <h2 class="playground-title">
          {{ item.name }}
          <span *ngIf="item.kindofsport?.length">
            - {{ (item.kindofsport ?? []).join(', ') }}
          </span>
        </h2>

        <p class="playground-address" *ngIf="item.address">
          <ion-icon
            name="location-outline"
            color="primary"
            style="vertical-align: middle; margin-right: 4px"
          ></ion-icon>
          {{ item.address }}
        </p>

        <div *ngIf="(item.avgRating ?? 0) > 0" class="playground-rating-row">
          <div class="rating-stars">
            <ng-container *ngFor="let star of [1, 2, 3, 4, 5]">
              <ion-icon
                [name]="star <= Math.round(item.avgRating ?? 0) ? 'star' : 'star-outline'"
                color="warning"
                style="font-size: 1.2em; vertical-align: middle"
              ></ion-icon>
            </ng-container>

            <span class="rating-value" style="margin-left: 8px">
              {{ item.avgRating }}/5
            </span>
          </div>

          <!-- сердечко -->
          <ion-icon
            [name]="item.isFavorite ? 'heart' : 'heart-outline'"
            color="danger"
            style="font-size: 1.4em; vertical-align: middle; margin-left: 12px"
            (click)="onToggleFavorite(item, $event)"
          ></ion-icon>
        </div>
      </div>

      <ion-icon
        *ngIf="(item.eventsCount ?? 0) > 0"
        name="calendar"
        color="success"
        style="font-size: 1.4em; position: absolute; top: 10px; right: 10px"
      ></ion-icon>
    </div>
  </ion-card>
</ion-list>
