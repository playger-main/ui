<ion-list>
  <ion-item *ngFor="let item of listPlaygrounds" [routerLink]="['/ground', item.id]" class="playground-item" style="position: relative;">
    <img [src]="item.avatar" alt="photo" class="playground-photo" slot="start" />
    <!-- Favorite icon at top right -->
   
    <ion-label>
      <h2 class="playground-title">{{ item.name }}</h2>
      <p class="playground-address">
        <ion-icon name="location-outline" color="primary" style="vertical-align: middle; margin-right: 4px;"></ion-icon>
        {{ item.location.address }}
      </p>
      <div *ngIf="item?.averageRating" class="playground-rating">
        <div class="rating-stars">
          <ng-container *ngFor="let star of [1,2,3,4,5]">
            <ion-icon
              [name]="star <= Math.round(item?.averageRating ?? 0) ? 'star' : 'star-outline'"
              color="warning"
              style="font-size: 1.2em; vertical-align: middle;">
            </ion-icon>
            
          </ng-container>
          <span class="rating-value" style="margin-left: 8px;">
            {{ item.averageRating }}/5
          </span>
        </div>
        <div class="rating-right">
          <ion-icon
          
            name="heart"
            color="medium"
            style="font-size: 1.2em; vertical-align: middle;">
          </ion-icon>
          
        </div>
      </div>
    </ion-label>
  </ion-item>
</ion-list>
