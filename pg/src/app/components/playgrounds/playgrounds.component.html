<ion-list class="playgrounds-list">
  <ion-card
    class="playground-item"
    [ngClass]="{ 'green-card': (item.eventsCount ?? 0) > 0 }"
    *ngFor="let item of (listPlaygrounds ?? [])"
    [routerLink]="['/ground', item.id]"
  >
    <div class="playground-card-content">
      <!-- LEFT: photo -->
      <div class="photo-wrap">
        <img
          [src]="item.avatar || 'assets/icon/placeholder-ground.png'"
          alt="photo"
          class="playground-photo"
          loading="lazy"
        />
      </div>

      <!-- CENTER: info -->
      <div class="playground-info">
        <div class="title-row">
          <h2 class="playground-title">
            {{ item.name }}
            <span class="kind" *ngIf="item.kindofsport?.length">
              · {{ (item.kindofsport ?? []).join(', ') }}
            </span>
          </h2>

          <!-- RIGHT TOP: calendar if has events -->
          <ion-icon
            *ngIf="(item.eventsCount ?? 0) > 0"
            class="calendar-badge"
            name="calendar"
          ></ion-icon>
        </div>

        <p class="playground-address" *ngIf="item.address">
          <ion-icon class="addr-icon" name="location-outline"></ion-icon>
          <span class="addr-text">{{ item.address }}</span>
        </p>

        <div class="meta-row" *ngIf="(item.avgRating ?? 0) > 0">
          <div class="rating-stars">
            <ng-container *ngFor="let s of [1, 2, 3, 4, 5]">
              <ion-icon
                [name]="s <= Math.round(item.avgRating ?? 0) ? 'star' : 'star-outline'"
                class="star-ico"
              ></ion-icon>
            </ng-container>

            <span class="rating-value">{{ item.avgRating }}/5</span>
          </div>

          <!-- heart -->
          <button
            type="button"
            class="fav-btn"
            (click)="onToggleFavorite(item, $event)"
            aria-label="Toggle favorite"
          >
            <ion-icon
              [name]="item.isFavorite ? 'heart' : 'heart-outline'"
              class="fav-ico"
            ></ion-icon>
          </button>
        </div>
      </div>
    </div>
  </ion-card>
</ion-list>
