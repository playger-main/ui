name: Deploy Angular (pg) to GitHub Pages

on:
  push:
    branches: [ main ]     # автодеплой при push/merge в main
  workflow_dispatch:       # ручной запуск

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    working-directory: pg   # все команды выполняем из папки pg

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pg/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build Angular (auto base-href)
        shell: bash
        run: |
          # если репо user.github.io → '/', иначе '/ui/'
          if [[ "${{ github.repository }}" == "${{ github.repository_owner }}/${{ github.repository_owner }}.github.io" ]]; then
            BASE="/"
          else
            BASE="/ui/"
          fi

          npx ng build --configuration production --base-href "$BASE" --output-path=dist/browser

          # SPA fallback для F5/прямых ссылок
          cp dist/browser/index.html dist/browser/404.html

      - name: List build output (debug)
        run: |
          echo "PWD=$(pwd)"
          ls -lah dist/browser
          find dist/browser -maxdepth 2 -type f | head -n 50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pg/dist/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
