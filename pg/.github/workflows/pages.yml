name: Deploy Angular (pg) to GitHub Pages

on:
  push:
    branches: [ main ]      # автодеплой при push/merge в main
  workflow_dispatch:        # возможность запустить вручную

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:                  # ВСЕ шаги выполняем из папки pg
  run:
    working-directory: pg

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pg/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build Angular (auto base-href)
        shell: bash
        run: |
          if [[ "${{ github.repository }}" == "${{ github.repository_owner }}/${{ github.repository_owner }}.github.io" ]]; then
            BASE="/"
          else
            BASE="/${{ github.event.repository.name }}/"
          fi

          npx ng build --configuration production --base-href "$BASE" --output-path=dist/browser

          # SPA fallback для маршрутов (F5 на вложенных URL)
          cp dist/browser/index.html dist/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pg/dist/browser   # указываем путь относительно корня репо

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
