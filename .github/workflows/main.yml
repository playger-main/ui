name: Deploy Angular (pg) to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    working-directory: pg

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pg/package-lock.json

      - name: Print env
        run: |
          node -v
          npm -v
          ls -lah
          test -f package-lock.json && echo "lock: yes" || echo "lock: no"

      - name: Install deps (ci or install)
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Angular (base-href=/ui/)
        shell: bash
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          BASE="/ui/"
          npx ng version
          npx ng build --configuration production --base-href "$BASE" --output-path=dist/browser --verbose
          cp dist/browser/index.html dist/browser/404.html

      - name: List build output (debug)
        run: |
          echo "PWD=$(pwd)"
          ls -lah dist/browser
          find dist/browser -maxdepth 2 -type f | head -n 50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pg/dist/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
