name: Deploy Angular (pg) to GitHub Pages

on:
  push:
    branches: [ main ]     # автодеплой при push/merge в main
  workflow_dispatch:       # ручной запуск из Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Все shell-команды выполняем в подпапке pg
defaults:
  run:
    working-directory: pg

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pg/package-lock.json

      - name: Print env
        run: |
          node -v
          npm -v
          ls -lah
          test -f package-lock.json && echo "lock: yes" || echo "lock: no"

      - name: Install deps (ci or install fallback)
        shell: bash
        run: |
          npm ci || npm install

      - name: Build Angular (base-href=/ui/)
        shell: bash
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          BASE="/ui/"   # имя репозитория
          npx ng version
          npx ng build --configuration production --base-href "$BASE" --output-path=dist/browser --verbose

      # Найти index.html где бы он ни лежал в dist/… и сделать 404.html рядом
      - id: detect_out
        name: Detect output dir & create 404 fallback
        shell: bash
        run: |
          set -e
          echo "PWD=$(pwd)"

          # 1) Если index.html там, где ожидали:
          if [ -f dist/browser/index.html ]; then
            OUT_DIR="dist/browser"
          else
            # 2) Ищем первый попавшийся index.html в dist (на 3 уровня вложенности)
            CANDIDATE="$(find dist -maxdepth 3 -type f -name index.html | head -n 1 || true)"
            if [ -n "$CANDIDATE" ]; then
              OUT_DIR="$(dirname "$CANDIDATE")"
            else
              echo "::error::index.html не найден в dist/. Содержимое dist:"
              find dist -maxdepth 3 -type f | sed 's/^/  /'
              exit 1
            fi
          fi

          echo "Output dir: $OUT_DIR"
          ls -lah "$OUT_DIR"

          # SPA fallback (чтобы F5/прямые ссылки не давали 404 на GitHub Pages)
          cp "$OUT_DIR/index.html" "$OUT_DIR/404.html" || true

          # Передадим путь, относительно корня репозитория
          echo "artifact=pg/$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: List build output (debug)
        run: |
          find dist -maxdepth 3 -type f | sed 's/^/  /'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect_out.outputs.artifact }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
